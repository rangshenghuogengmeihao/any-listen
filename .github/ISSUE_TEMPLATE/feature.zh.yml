name: ✨ 功能请求
description: 为这个项目提出一个想法，请先查看常见问题及搜索 Issue 列表中有无你要提的问题
title: '[Feature]: '
body:
  - type: checkboxes
    id: check-answer
    attributes:
      label: 解决方案检查
      description: 为了防止重复提交相同的问题，确认你已经检查过以下内容，重复的 issue 会被直接关闭
      options:
        - label: 我已搜索 [Issue 列表](https://github.com/any-listen/any-listen/issues?q=is%3Aissue+)，并没有发现类似的问题
          required: true
        - label: 我已搜索 [讨论区](https://github.com/any-listen/any-listen/discussions)，并没有发现类似的话题
          required: true

  - type: dropdown
    id: check-app-type
    attributes:
      label: 应用类型
      description: 你提的功能请求是针对 Any Listen 的哪个版本的
      options:
        - 桌面版
        - Web 服务版
        - 桌面版与 Web 服务版
    validations:
      required: true

  - type: textarea
    id: problem-description
    attributes:
      label: 问题描述与想要的解决方案
      description: 请清晰简洁地描述你的问题以及希望通过此功能请求解决的问题
    validations:
      required: true

  - type: textarea
    id: additional-information
    attributes:
      label: 附加信息
      description: 如果你的问题需要进一步解释，或者想要表达其他内容，请在此处添加更多信息。（直接把图片/视频拖到编辑框即可添加图片/视频）
